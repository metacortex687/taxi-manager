{% extends "base.html" %}

{% block title %}Предприятия менеджера{% endblock title %}

{% block content %}

<h5>Предприятия:</h5>
<ul id="listEnterprises">
</ul>

{% endblock content %}

{% block script %}
<script>
    const loadEnterprises = async () => {
        const tokenAuth = localStorage.getItem("tokenAuth")
        const listEnterprises = document.getElementById("listEnterprises")
        

        const response = await fetch("/api/v1/enterprises/", {
            method: "GET",
            headers: { "Accept": "application/json", "Content-Type": "application/json", "Authorization": `Token ${tokenAuth}` }})


        const data = await response.json()

        listEnterprises.innerHTML = ""
        for (let enterprise of data.results) {
            listEnterprises.innerHTML += `\n<li>${enterprise.name}</li>`
        }
    }


    const initPage = async () => {
        loadEnterprises();
    } 

</script>    
{% endblock script %}
