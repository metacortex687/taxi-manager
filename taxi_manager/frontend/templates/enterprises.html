{% extends "base/base.html" %}

{% block title %}Предприятия менеджера{% endblock title %}

{% block content %}

<h5>Предприятия:</h5>
<ul id="listEnterprises">
</ul>

{% endblock content %}

{% block script %}
<script>

    const loadEnterprises = async () => {
        
        const listEnterprises = document.getElementById("listEnterprises")

        data = await fetch_data("/api/v1/enterprises/")

        listEnterprises.innerHTML = data.results.map(enterprise => `<li><a <a href="${enterprise.id}/edit/"> ${enterprise.name}</a> <a href="${enterprise.id}/vehicles/">Авто</a></li>`).join("\n")

    }


    const initPage = async () => {
        loadEnterprises();
    }

</script>
{% endblock script %}
