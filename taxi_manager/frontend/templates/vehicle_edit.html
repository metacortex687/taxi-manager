{% extends "base.html" %}

{% block title %}Редактирование авто{% endblock title %}

{% block content %}

<form class="d-flex justify-content-center">
    <div class="auth-box mb-3">
        <h1 class="text-center">Автомобиль:</h1>
        <div id="form_fields">
        </div>
        <div class="d-flex justify-content-end gap-1">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="submit" class="btn btn-danger">Удалить</button>
        </div>
    </div>
</form>

<div id="pageData" data-pk-vehicle="{{vehicle.pk}}"></div>

{% endblock content %}


{% block script %}
<script>
    const authForm = document.getElementById("authForm")

    // authForm.onsubmit = async (event) => {
    // };

    const renderInputField = (id, value, label) => {
        return `
            <div class="mb-3">
                <label for="${id}" class="form-label">${label}</label>
                <input type="text" class="form-control" id="${id}" value="${value}">
            </div> 
        `
    }

    const renderSelectedField = (id, form_data, selected_data, label, isSelect, representation, placeholder) => {
        options = selected_data.map(selected_record => `
            <option value="${selected_record.id}" ${isSelect(form_data, selected_record) ? "selected" : ""}>${representation(selected_record)}</option>
        `).join("")

        return `
            <div class="mb-3">
                <label for="${id}" class="form-label">${label}</label>
                <select class="form-select" id="${id}">
                    <option value="" disabled>${placeholder}</option>
                    ${options}
                </select>
            </div>
        `
    }

    const renderMultySelectedDriverField = (form_drivers_data) => {
        console.log(form_drivers_data)
        const lis = form_drivers_data.map(record => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${record.last_name} ${record.first_name}</span>
                    <button type="button" class="btn btn-sm btn-outline-danger">×</button>
                </li>
        `).join("")

        return `
            <div class="mb-3">
                <label for="inputDrivers" class="form-label">Водители:</label>
                <ul class="list-group" id="inputDrivers">
                ${lis}
                </ul>
            </div>             
        `
    }

    const renderForm = async () => {
        const form_fields = document.getElementById("form_fields")
        const pkVehicle = document.getElementById("pageData").dataset.pkVehicle


        form_data = await fetch_data(`/api/v1/vehicles/${pkVehicle}/`)
        brands_data = (await fetch_data(`/api/v1/models/`)).results
        enterprises_data = (await fetch_data(`/api/v1/enterprises/`)).results 



        form_fields.innerHTML += renderSelectedField("inputEnterprise", form_data, enterprises_data, "Предприятие:",
            (form_data, selected_record) => form_data.enterprise_id === selected_record.id,
            (selected_record) => `${selected_record.name} (${selected_record.city})`, "Выберите предприятие")

        form_fields.innerHTML += renderSelectedField("inputBrand", form_data, brands_data, "Бренд:",
            (form_data, selected_record) => form_data.brand_id === selected_record.id,
            (selected_record) => `${selected_record.name} (${selected_record.color})`, "Выберите бренд")
            

        form_fields.innerHTML += renderInputField("inputNumber", form_data.number, "Номер")
        form_fields.innerHTML += renderInputField("inputMileage", form_data.mileage, "Пробег (км):")
        form_fields.innerHTML += renderInputField("inputPrice", form_data.price, "Цена (руб):")
        form_fields.innerHTML += renderInputField("inputVin", form_data.vin, "VIN:")
        form_fields.innerHTML += renderInputField("inputYear", form_data.year_of_manufacture, "Год выпуска:")

        console.log(form_data)
        console.log(`/api/v1/drivers/?id__in=${form_data.driver_ids.join(",")}`)
        form_drivers_data = (await fetch_data(`/api/v1/drivers/?id__in=${form_data.driver_ids.join(",")}&ordering=last_name,first_name`)).results 
        form_fields.innerHTML += renderMultySelectedDriverField(form_drivers_data)
    }

    const initPage = async () => {
        renderForm()

    }

</script>
{% endblock script %}


{% block style %}
<style>
    .auth-box {
        width: 420px;
    }
</style>
{% endblock style %}
