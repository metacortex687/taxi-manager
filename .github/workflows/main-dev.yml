name: main-dev

on: 
  workflow_dispatch:
  # push:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: taxi_manager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

    env:
      DJANGO_SUPERUSER_NAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin
      SECRET_KEY: change-me
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgis://postgres:postgres@localhost:5432/taxi_manager
      LOCATIONIQ_KEY: ${{ secrets.LOCATIONIQ_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install GeoDjango System Dependencies
        run: make install-geo-deps-ci

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run manage.py test

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: metacortex687
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Django app
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: metacortex687/taxi-manager-dev:latest

      - name: Build and push Rust API
        uses: docker/build-push-action@v7
        with:
          context: ./rust-api
          file: ./rust-api/Dockerfile
          push: true
          tags: metacortex687/taxi-manager-rust-api-dev:latest
      
      - name: Build and push Varnish exporter
        uses: docker/build-push-action@v7
        with:
          context: ./varnish-exporter
          file: ./varnish-exporter/Dockerfile
          push: true
          tags: metacortex687/taxi-manager-varnish-exporter-dev:latest

      - name: Build and push notification service
        uses: docker/build-push-action@v7
        with:
          context: ./notification_service
          file: ./notification_service/Dockerfile
          push: true
          tags: metacortex687/taxi-manager-notification-service-dev:latest

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST_IP }}
          username: ${{ secrets.DEV_HOST_USER }}
          key: ${{ secrets.DEV_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_HOST_PORT }}
          script: mkdir -p "$HOME/taxi-manager"

      - name: Create Docker Compose environment files
        shell: bash
        env:
          POSTGRES_USER: ${{ secrets.DEV_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DEV_POSTGRES_DB }}
          DJANGO_SUPERUSER_NAME: ${{ secrets.DEV_DJANGO_SUPERUSER_NAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.DEV_DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DEV_DJANGO_SUPERUSER_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DEV_DJANGO_SECRET_KEY }}
          LOCATIONIQ_KEY: ${{ secrets.LOCATIONIQ_KEY }}
          VK_BOT_TOKEN: ${{ secrets.VK_BOT_TOKEN }}
          VK_BOT_GROUP_ID: ${{ secrets.VK_BOT_GROUP_ID }}
          DEV_UI_PATH_SUFFIX: ${{ secrets.DEV_UI_PATH_SUFFIX }}
          LOKI_URL: http://${{ secrets.OBS_HOST_IP }}:3100/loki/api/v1/push
          TEMPO_ENDPOINT: ${{ secrets.OBS_HOST_IP }}:4317
          PYROSCOPE_URL: http://${{ secrets.OBS_HOST_IP }}:4040
          PROMETHEUS_REMOTE_WRITE_URL: http://${{ secrets.OBS_HOST_IP }}:9090/api/v1/write
        run: |
          set -euo pipefail
          umask 077

          {
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'DJANGO_SUPERUSER_NAME=%s\n' "$DJANGO_SUPERUSER_NAME"
            printf 'DJANGO_SUPERUSER_EMAIL=%s\n' "$DJANGO_SUPERUSER_EMAIL"
            printf 'DJANGO_SUPERUSER_PASSWORD=%s\n' "$DJANGO_SUPERUSER_PASSWORD"
            printf 'DJANGO_SECRET_KEY=%s\n' "$DJANGO_SECRET_KEY"
            printf 'LOCATIONIQ_KEY=%s\n' "$LOCATIONIQ_KEY"
            printf 'VK_BOT_TOKEN=%s\n' "$VK_BOT_TOKEN"
            printf 'VK_BOT_GROUP_ID=%s\n' "$VK_BOT_GROUP_ID"
            printf 'DEV_UI_PATH_SUFFIX=%s\n' "$DEV_UI_PATH_SUFFIX"
            printf 'DEPLOYMENT_ENVIRONMENT=dev\n'
            printf 'LOKI_URL=%s\n' "$LOKI_URL"
            printf 'TEMPO_ENDPOINT=%s\n' "$TEMPO_ENDPOINT"
            printf 'PYROSCOPE_URL=%s\n' "$PYROSCOPE_URL"
            printf 'PROMETHEUS_REMOTE_WRITE_URL=%s\n' "$PROMETHEUS_REMOTE_WRITE_URL"
          } > .env.dev

          {
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
          } > .env.kafka

          {
            printf 'VK_BOT_TOKEN=%s\n' "$VK_BOT_TOKEN"
            printf 'VK_BOT_GROUP_ID=%s\n' "$VK_BOT_GROUP_ID"
            printf 'AUTH_API_URL=http://nginx/api/v1/auth/\n'
            printf 'KAFKA_BOOTSTRAP_SERVERS=kafka:9092\n'
          } > .env.notification-service

      - name: Upload deployment configuration
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEV_HOST_IP }}
          username: ${{ secrets.DEV_HOST_USER }}
          key: ${{ secrets.DEV_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_HOST_PORT }}
          source: ".env.dev,.env.kafka,.env.notification-service,docker-compose.dev.yaml,docker-compose.kafka.yaml,docker-compose.notification-service.yaml,nginx.conf,config.alloy,varnish/default.vcl,kafka"
          target: "taxi-manager"
          overwrite: true

      - name: Deploy using an SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST_IP }}
          username: ${{ secrets.DEV_HOST_USER }}
          key: ${{ secrets.DEV_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_HOST_PORT }}
          # passphrase: ${{ secrets.DEV_SSH_PASSPHRASE }}
          script: |
            bash -se <<'BASH'
            set -euo pipefail

            APP_DIR="$HOME/taxi-manager"

            whoami
            ls -al

            mkdir -p "$APP_DIR"
            mkdir -p "$APP_DIR/data/logs/nginx"
            mkdir -p "$APP_DIR/data/goaccess"
            mkdir -p "$APP_DIR/data/notification-service"
            mkdir -p "$APP_DIR/varnish"

            touch "$APP_DIR/data/notification-service/db.sqlite3"

            cd "$APP_DIR"

            chmod 600 .env.dev .env.kafka .env.notification-service
            chmod 600 data/notification-service/db.sqlite3

            DEV_UI_PATH_SUFFIX="$(sed -n 's/^DEV_UI_PATH_SUFFIX=//p' .env.dev)"
            case "$DEV_UI_PATH_SUFFIX" in
              ''|*[!A-Za-z0-9_-]*)
                echo "DEV_UI_PATH_SUFFIX must contain only letters, digits, '_' or '-'"
                exit 1
                ;;
            esac

            docker compose --env-file .env.dev -p taxi-manager -f docker-compose.dev.yaml pull

            docker compose \
              --env-file .env.notification-service \
              -p notification-service \
              -f docker-compose.notification-service.yaml \
              pull

            docker compose \
              --env-file .env.kafka \
              -p taxi-manager-kafka \
              -f docker-compose.kafka.yaml \
              pull \
              kafka \
              debezium \
              debezium-create-connector \
              kafka-create-topics \
              kafka-ui

            # Create the Kafka network before Nginx joins it on the first deployment.
            docker compose --env-file .env.kafka -p taxi-manager-kafka -f docker-compose.kafka.yaml up -d kafka

            docker compose --env-file .env.dev -p taxi-manager -f docker-compose.dev.yaml up -d --no-build --force-recreate --remove-orphans

            docker compose \
              --env-file .env.notification-service \
              -p notification-service \
              -f docker-compose.notification-service.yaml \
              up -d --no-build --force-recreate --remove-orphans

            docker compose \
              --env-file .env.kafka \
              -p taxi-manager-kafka \
              -f docker-compose.kafka.yaml \
              up -d --build --remove-orphans

            docker compose --env-file .env.dev -p taxi-manager -f docker-compose.dev.yaml exec -T nginx nginx -t

            docker compose --env-file .env.dev -p taxi-manager -f docker-compose.dev.yaml ps
            docker compose --env-file .env.notification-service -p notification-service -f docker-compose.notification-service.yaml ps
            docker compose --env-file .env.kafka -p taxi-manager-kafka -f docker-compose.kafka.yaml ps -a

            echo "Disk usage before cleanup:"
            df -h
            docker system df || true

            # Safe cleanup: do not remove Docker volumes, because PostgreSQL data can live there.
            sudo -n journalctl --vacuum-size=200M || true
            sudo -n apt-get clean || true
            sudo -n find /var/lib/docker/containers/ -name "*-json.log" -exec truncate -s 0 {} \; || true

            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true
            docker network prune -f || true

            echo "Disk usage after cleanup:"
            df -h
            docker system df || true
            BASH