name: observability-cloud

on: push
  # workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare observability directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OBS_HOST_IP }}
          username: ${{ secrets.OBS_HOST_USER }}
          key: ${{ secrets.OBS_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OBS_HOST_PORT }}
          script: |
            mkdir -p "$HOME/observability"
            mkdir -p "$HOME/observability/grafana/provisioning/datasources"
            mkdir -p "$HOME/observability/grafana/dashboards"

      - name: Copy observability files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.OBS_HOST_IP }}
          username: ${{ secrets.OBS_HOST_USER }}
          key: ${{ secrets.OBS_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OBS_HOST_PORT }}
          source: "docker-compose.dev.observability.yaml,tempo.yaml,prometheus.yml,loki-config.yaml,loki.yml,config.alloy,grafana/provisioning/datasources"
          target: "observability"

      - name: Deploy observability stack
        uses: appleboy/ssh-action@v1
        env:
          OBS_GRAFANA_ADMIN_USER: ${{ secrets.OBS_GRAFANA_ADMIN_USER }}
          OBS_GRAFANA_ADMIN_PASSWORD: ${{ secrets.OBS_GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.OBS_HOST_IP }}
          username: ${{ secrets.OBS_HOST_USER }}
          key: ${{ secrets.OBS_HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OBS_HOST_PORT }}
          envs: OBS_GRAFANA_ADMIN_USER,OBS_GRAFANA_ADMIN_PASSWORD
          script: |
            bash -se <<'BASH'
            set -euo pipefail

            OBS_DIR="$HOME/observability"
            cd "$OBS_DIR"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing Docker..."
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sudo sh /tmp/get-docker.sh
            fi

            if docker ps >/dev/null 2>&1; then
              DOCKER="docker"
            else
              DOCKER="sudo docker"
            fi

            cat > .env <<EOF
            GRAFANA_BIND_ADDR=0.0.0.0
            PROMETHEUS_BIND_ADDR=0.0.0.0
            LOKI_BIND_ADDR=0.0.0.0
            TEMPO_OTLP_GRPC_BIND_ADDR=0.0.0.0
            TEMPO_OTLP_HTTP_BIND_ADDR=0.0.0.0
            TEMPO_HTTP_BIND_ADDR=127.0.0.1
            PYROSCOPE_BIND_ADDR=0.0.0.0
            OBS_GRAFANA_ADMIN_USER=${OBS_GRAFANA_ADMIN_USER}
            OBS_GRAFANA_ADMIN_PASSWORD=${OBS_GRAFANA_ADMIN_PASSWORD}
            EOF

            $DOCKER compose -f docker-compose.dev.observability.yaml pull
            $DOCKER compose -f docker-compose.dev.observability.yaml up -d --force-recreate --remove-orphans
            $DOCKER compose -f docker-compose.dev.observability.yaml ps

            echo "Checking readiness..."

            for url in \
              http://127.0.0.1:9090/-/ready \
              http://127.0.0.1:3100/ready \
              http://127.0.0.1:3200/ready
            do
              echo "Waiting for $url"

              for i in {1..30}; do
                if curl -fsS "$url" >/dev/null; then
                  echo "Ready: $url"
                  break
                fi

                if [ "$i" -eq 30 ]; then
                  echo "Service is not ready: $url"
                  exit 1
                fi

                sleep 2
              done
            done
            BASH