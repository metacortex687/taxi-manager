services:
  load-generator:
    image: grafana/k6:latest
    container_name: load-generator
    user: root
    env_file:
      - .load-testing.env
    environment:
      TIME_UNIT: "1s"
      K6_PROMETHEUS_RW_SERVER_URL: "http://alloy:9998/api/v1/metrics/write"
      K6_PROMETHEUS_RW_TREND_STATS: "avg,p(50),p(90),p(95),p(99),min,max"
      K6_PROMETHEUS_RW_PUSH_INTERVAL: "1s"
    volumes:
      - ./performance:/scripts:ro
      - ./performance/results:/results
    command:
      - run
      - --summary-export
      - /results/summary.json
      - /scripts/load_test.js
    networks:
      - load_testing_target

networks:
  load_testing_target:
    name: taxi_manager_load_testing_net
    external: true