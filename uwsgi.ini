#mysite_uwsgi.ini 
[uwsgi]

# Настройки, связанные с Django
# Корневая папка проекта (полный путь)
chdir           = /app
# Django wsgi файл
module          = taxi_manager.infrastructure.wsgi:application
# полный путь к виртуальному окружению
home            = /app/.venv

# общие настройки
# master
master          = true
# максимальное количество процессов
processes       = 3
# полный путь к файлу сокета
# socket = 0.0.0.0:8000
socket          = /run/uwsgi/taxi-manager.sock
chmod-socket    = 666
# права доступа к файлу сокета
# chmod-socket    = 664
# очищать окружение от служебных файлов uwsgi по завершению
vacuum          = true

# очередь подключений к uWSGI socket;
# помогает не получать 502 сразу, если все worker-ы заняты
listen          = 128

# синхронизирует приём соединений между worker-ами;
# полезно при нескольких process-ах
thunder-lock    = true

# убивает worker, если request выполняется слишком долго;
# помогает находить зависшие endpoint-ы
harakiri        = 120
harakiri-verbose = true

# перезапускает worker-ы после заданного числа запросов;
# снижает риск накопления утечек памяти и деградации
max-requests    = 1000
max-requests-delta = 100

# корректно завершает uWSGI при docker stop/restart
die-on-term     = true

# разрешает фоновые потоки библиотекам;
# request-ы потоками не обрабатываются, так как threads не задан
enable-threads  = true