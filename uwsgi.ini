#mysite_uwsgi.ini 
[uwsgi]

# Настройки, связанные с Django
# Корневая папка проекта (полный путь)
chdir           = /app
# Django wsgi файл
module          = taxi_manager.infrastructure.wsgi:application
# полный путь к виртуальному окружению
home            = /app/.venv

# общие настройки
# master
master          = true
# максимальное количество процессов
processes       = 4
# полный путь к файлу сокета
# socket = 0.0.0.0:8000
socket          = /run/uwsgi/taxi-manager.sock
chmod-socket = 666
# права доступа к файлу сокета
# chmod-socket    = 664
# очищать окружение от служебных файлов uwsgi по завершению
vacuum          = true