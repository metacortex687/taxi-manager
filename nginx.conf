events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # log_format upstream_debug '$remote_addr "$request" '
    #                           'status=$status '
    #                           'upstream_addr=$upstream_addr '
    #                           'upstream_status=$upstream_status '
    #                           'request_time=$request_time '
    #                           'upstream_response_time=$upstream_response_time';
    # access_log /var/log/nginx/access.log upstream_debug;

    upstream taxi-manager {
        server unix:/run/uwsgi/taxi-manager.sock; # взаимодействие с uwsgi через Unix-сокет
        # server taxi-manager:8000;
    }

    upstream taxi-manager-asgi {
        server taxi-manager-asgi:8000;
    }

    upstream rust_api {
        server rust-api:8080;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost;
       
        client_max_body_size 75M;

        location = /report.html {
            alias /data/goaccess/report.html;
        }

        location = /nginx-access.log {
            alias /var/log/nginx/access.log;
        }

        location / {
            uwsgi_pass  taxi-manager;
            include     /etc/nginx/uwsgi_params;
        }

        location /static/ {
            alias  /static/;
        }

        location ^~ /api/v1/sse/ {
            proxy_pass http://taxi-manager-asgi;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 6h;
            proxy_send_timeout 6h;
        }

        location ^~ /api/v1/async/ {
            proxy_pass http://taxi-manager-asgi;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location = /nginx_status {
            stub_status;
            access_log off;
            # allow 127.0.0.1;
            # deny all;
        }

        location /api/v1/rust/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://rust_api/;
        }

    }

    server {
        listen 80;
        server_name flink_${DEV_UI_PATH_SUFFIX};

        set $flink_ui_backend flink-jobmanager:8081;

        location / {
            proxy_pass http://$flink_ui_backend;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 1h;
        }
    }

    server {
        listen 80;
        server_name apache_${DEV_UI_PATH_SUFFIX};

        set $kafka_ui_backend kafka-ui:8080;

        location / {
            proxy_pass http://$kafka_ui_backend;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 1h;
        }
    }



}

