events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # log_format upstream_debug '$remote_addr "$request" '
    #                           'status=$status '
    #                           'upstream_addr=$upstream_addr '
    #                           'upstream_status=$upstream_status '
    #                           'request_time=$request_time '
    #                           'upstream_response_time=$upstream_response_time';
    # access_log /var/log/nginx/access.log upstream_debug;

    upstream taxi-manager {
        server unix:/run/uwsgi/taxi-manager.sock; # взаимодействие с uwsgi через Unix-сокет
        # server taxi-manager:8000;
    }

    upstream taxi-manager-asgi {
        server taxi-manager-asgi:8000;
    }

    server {
        listen 80;
        server_name localhost;
       
        client_max_body_size 75M;

        location = /report.html {
            alias /data/goaccess/report.html;
        }

        location = /nginx-access.log {
            alias /var/log/nginx/access.log;
        }

        location / {
            uwsgi_pass  taxi-manager;
            include     /etc/nginx/uwsgi_params;
        }

        location /static/ {
            alias  /static/;
        }

        location ^~ /api/v1/sse/ {
            proxy_pass http://taxi-manager-asgi;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 6h;
            proxy_send_timeout 6h;
        }


    }



}


