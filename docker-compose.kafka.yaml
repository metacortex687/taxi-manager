services:
  kafka:
    image: apache/kafka:4.3.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    ports:
      - "127.0.0.1:9092:29092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network

  debezium:
    image: quay.io/debezium/connect:3.6
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: taxi-manager-debezium
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "127.0.0.1:8083:8083"
    networks:
      - kafka-network
      - taxi-manager-network

  debezium-create-connector:
    image: curlimages/curl:8.21.0
    restart: "no"
    depends_on:
      - debezium
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        until curl \
          --fail \
          --silent \
          http://debezium:8083/connectors \
          > /dev/null
        do
          echo "Waiting for Debezium REST API..."
          sleep 2
        done

        if curl \
          --fail \
          --silent \
          http://debezium:8083/connectors/taxi-manager-postgres \
          > /dev/null
        then
          echo "Connector taxi-manager-postgres already exists"
          exit 0
        fi

        echo "Creating connector taxi-manager-postgres..."

        curl \
          --fail-with-body \
          --show-error \
          --request POST \
          --header "Content-Type: application/json" \
          --data-binary @/config/debezium-postgres.json \
          http://debezium:8083/connectors
    volumes:
      - ./kafka/debezium-postgres.json:/config/debezium-postgres.json:ro
    networks:
      - kafka-network

  kafka-create-topics:
    image: apache/kafka:4.3.1
    restart: "no"
    depends_on:
      debezium-create-connector:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        echo "Creating Kafka topics..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic taxi_manager.assignment_managers \
          --partitions 1 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic taxi_manager.enterprises \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.compaction.lag.ms=604800000 \
          --config max.compaction.lag.ms=604800000

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic taxi_manager.vehicles \
          --partitions 1 \
          --replication-factor 1

        echo "Kafka topics are ready"
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: taxi-manager
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium:8083
    ports:
      - "127.0.0.1:8089:8080"
    networks:
      - kafka-network

  flink-jobmanager:
    build:
      context: ./kafka/flink
    restart: unless-stopped
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "127.0.0.1:8091:8081"
    networks:
      - kafka-network

  flink-taskmanager:
    build:
      context: ./kafka/flink
    restart: unless-stopped
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - kafka-network

  flink-sql-init:
    build:
      context: ./kafka/flink
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
      - kafka-create-topics
    command:
      - /bin/sh
      - -ec
      - |
        echo "Waiting for Flink..."
        sleep 10

        for sql_file in /opt/flink/sql/*.sql; do
          echo "Running $$sql_file"
          /opt/flink/bin/sql-client.sh -f "$$sql_file"
        done

        echo "All SQL files started"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
    volumes:
      - ./kafka/flink/sql:/opt/flink/sql:ro
    networks:
      - kafka-network



networks:
  kafka-network:

  taxi-manager-network:
    external: true
    name: taxi-manager_default

volumes:
  kafka-data:
  flink-checkpoints:
  flink-savepoints: