services:
  kafka:
    image: apache/kafka:4.3.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - kafka-network

  debezium:
    image: quay.io/debezium/connect:3.6
    depends_on:
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: taxi-manager-debezium
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "127.0.0.1:8083:8083"
    networks:
      - kafka-network
      - taxi-manager-network

  debezium-create-connector:
    image: curlimages/curl:8.21.0
    restart: "no"
    depends_on:
      - debezium
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        until curl \
          --fail \
          --silent \
          http://debezium:8083/connectors \
          > /dev/null
        do
          echo "Waiting for Debezium REST API..."
          sleep 2
        done

        if curl \
          --fail \
          --silent \
          http://debezium:8083/connectors/taxi-manager-postgres \
          > /dev/null
        then
          echo "Connector taxi-manager-postgres already exists"
          exit 0
        fi

        echo "Creating connector taxi-manager-postgres..."

        curl \
          --fail-with-body \
          --show-error \
          --request POST \
          --header "Content-Type: application/json" \
          --data-binary @/config/debezium-postgres.json \
          http://debezium:8083/connectors
    volumes:
      - ./kafka/debezium-postgres.json:/config/debezium-postgres.json:ro
    networks:
      - kafka-network

  kafka-create-topics:
    image: apache/kafka:4.3.1
    restart: "no"
    depends_on:
      debezium-create-connector:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        echo "Creating Kafka topics..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic assignment_managers \
          --partitions 1 \
          --replication-factor 1

        echo "Kafka topics are ready"
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: taxi-manager
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium:8083
    ports:
      - "127.0.0.1:8089:8080"
    networks:
      - kafka-network

networks:
  kafka-network:

  taxi-manager-network:
    external: true
    name: taxi-manager_default