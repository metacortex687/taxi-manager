services:
  taxi-manager:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    labels:
      logging: "alloy"
    volumes:
      - static_volume:/app/staticfiles
      - uwsgi_socket:/run/uwsgi
      - memcached_socket:/run/memcached
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}  
      - DJANGO_SUPERUSER_NAME=${DJANGO_SUPERUSER_NAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - VK_BOT_TOKEN=${VK_BOT_TOKEN}
      - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
      - DJANGO_MEMCACHED_LOCATION=unix:/run/memcached/memcached.sock
      - PYTHONUNBUFFERED=1

      - OTEL_SERVICE_NAME=taxi-manager-django-wsgi
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - DJANGO_SETTINGS_MODULE=taxi_manager.infrastructure.settings
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_PYTHON_LOG_LEVEL=info
      - OTEL_PYTHON_LOG_FORMAT=%(asctime)s %(levelname)s [%(name)s] [trace_id=%(otelTraceID)s span_id=%(otelSpanID)s service_name=%(otelServiceName)s] %(message)s

      - PYROSCOPE_ENABLED=true
      - PYROSCOPE_APPLICATION_NAME=taxi-manager-django
      - PYROSCOPE_SERVER_ADDRESS=http://alloy:9999
      - PYROSCOPE_SAMPLE_RATE=100
      - DEPLOYMENT_ENVIRONMENT=dev

    command: sh -c "make migrate && make collectstatic && make ensure-superuser && make ensure-demo-data && uv run opentelemetry-instrument make run-uwsgi"
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started

  taxi-manager-asgi:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    labels:
      logging: "alloy"
    volumes:
      - static_volume:/app/staticfiles
      - memcached_socket:/run/memcached
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}  
      - DJANGO_SUPERUSER_NAME=${DJANGO_SUPERUSER_NAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - VK_BOT_TOKEN=${VK_BOT_TOKEN}
      - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
      - DJANGO_MEMCACHED_LOCATION=unix:/run/memcached/memcached.sock
      - PYTHONUNBUFFERED=1

      - OTEL_SERVICE_NAME=taxi-manager-django-asgi
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - DJANGO_SETTINGS_MODULE=taxi_manager.infrastructure.settings
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_PYTHON_LOG_LEVEL=info
      - OTEL_PYTHON_LOG_FORMAT=%(asctime)s %(levelname)s [%(name)s] [trace_id=%(otelTraceID)s span_id=%(otelSpanID)s service_name=%(otelServiceName)s] %(message)s

      - PYROSCOPE_ENABLED=true
      - PYROSCOPE_APPLICATION_NAME=taxi-manager-django
      - PYROSCOPE_SERVER_ADDRESS=http://alloy:9999
      - PYROSCOPE_SAMPLE_RATE=100
      - DEPLOYMENT_ENVIRONMENT=dev

    command: sh -c "uv run opentelemetry-instrument make run-asgi"
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started

  task-worker:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    labels:
      logging: "alloy"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - PYTHONUNBUFFERED=1

      - OTEL_SERVICE_NAME=taxi-manager-task-worker
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - DJANGO_SETTINGS_MODULE=taxi_manager.infrastructure.settings
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_PYTHON_LOG_LEVEL=info
      - OTEL_PYTHON_LOG_FORMAT=%(asctime)s %(levelname)s [%(name)s] [trace_id=%(otelTraceID)s span_id=%(otelSpanID)s service_name=%(otelServiceName)s] %(message)s

      - PYROSCOPE_ENABLED=true
      - PYROSCOPE_APPLICATION_NAME=taxi-manager-task-worker
      - PYROSCOPE_SERVER_ADDRESS=http://alloy:9999
      - PYROSCOPE_SAMPLE_RATE=100
      - DEPLOYMENT_ENVIRONMENT=dev

    command: sh -c "uv run opentelemetry-instrument python manage.py db_worker --queue-name reports,geocoding,default"
    depends_on:
      db:
        condition: service_healthy

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
      - /:/host/root:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - LOKI_URL=${LOKI_URL:-http://loki:3100/loki/api/v1/push}
      - TEMPO_ENDPOINT=${TEMPO_ENDPOINT:-tempo:4317}
      - PYROSCOPE_URL=${PYROSCOPE_URL:-http://pyroscope:4040}
      - PROMETHEUS_REMOTE_WRITE_URL=${PROMETHEUS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}
      - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-dev}

  memcached:
    image: memcached:1.6
    user: root
    volumes:
      - memcached_socket:/run/memcached
    command:
      - -u
      - root
      - -s
      - /run/memcached/memcached.sock
      - -a
      - "777"
      - --conn-limit=1024
      - --memory-limit=64
      - --threads=4

  goaccess:
    image: allinurl/goaccess
    container_name: goaccess
    ports:
      - 7890:7890
    volumes:
      - ./data/logs/nginx/:/var/log/nginx/:ro
      - ./data/goaccess/:/data/
    command:
      - /var/log/nginx/access.log 
      - --log-format=COMBINED  
      - --datetime-format=%d/%b/%Y:%H:%M:%S %z 
      - -o 
      - /data/report.html
      - --real-time-html

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    pid: host
    command:
      - --enable_metrics=cpu,memory,network,disk,diskIO,process
      - --docker_only=true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
  # vk-bot:
  #   image: metacortex687/taxi-manager-dev
  #   restart: always
  #   environment:
  #     - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  #     - SECRET_KEY=${DJANGO_SECRET_KEY}
  #     - VK_BOT_TOKEN=${VK_BOT_TOKEN}
  #     - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
  #     - PYTHONUNBUFFERED=1
  #   command: sh -c "make run-vk-bot"
  #   depends_on:
  #     db:
  #       condition: service_healthy  
  # change-data-listener:
  #   image: metacortex687/taxi-manager-dev
  #   restart: always
  #   environment:
  #     - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  #     - SECRET_KEY=${DJANGO_SECRET_KEY}
  #     - VK_BOT_TOKEN=${VK_BOT_TOKEN}
  #     - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
  #     - PYTHONUNBUFFERED=1
  #   command: sh -c "make run-pgwatch-listener"
  #   depends_on:
  #     db:
  #       condition: service_healthy  
  db:
    image: postgis/postgis:16-3.5
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx
    labels:
      logging: "alloy"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - uwsgi_socket:/run/uwsgi
      - ./data/logs/nginx/:/var/log/nginx/
      - ./data/goaccess/:/data/goaccess/:ro
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      taxi-manager:
        condition: service_started
        restart: true
      taxi-manager-asgi:
        condition: service_started
        restart: true
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    restart: unless-stopped


volumes:
  pgdata:
  static_volume:
  uwsgi_socket:
  memcached_socket:
  alloy_data: