  #     - PYTHONUNBUFFERED=1
  #   command: sh -c "make run-pgwatch-listener"
  #   depends_on:
  #     db:
  #       condition: service_healthy  
  db:
    image: postgis/postgis:16-3.5
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx
    labels:
      logging: "alloy"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - uwsgi_socket:/run/uwsgi
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - taxi-manager
volumes:
  pgdata:
  static_volume:
  uwsgi_socket:
  memcached_socket:
  prometheus_data:
  loki_data:
  alloy_data:
  grafana_data: