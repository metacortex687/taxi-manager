services:
  taxi-manager:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    labels:
      logging: "alloy"
    volumes:
      - static_volume:/app/staticfiles
      - uwsgi_socket:/run/uwsgi
      - memcached_socket:/run/memcached
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}  
      - DJANGO_SUPERUSER_NAME=${DJANGO_SUPERUSER_NAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - VK_BOT_TOKEN=${VK_BOT_TOKEN}
      - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
      - DJANGO_MEMCACHED_LOCATION=unix:/run/memcached/memcached.sock
      - PYTHONUNBUFFERED=1
      - OTEL_SERVICE_NAME=taxi-manager-django-wsgi
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - DJANGO_SETTINGS_MODULE=taxi_manager.infrastructure.settings
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_PYTHON_LOG_LEVEL=info
      - OTEL_PYTHON_LOG_FORMAT=%(asctime)s %(levelname)s [%(name)s] [trace_id=%(otelTraceID)s span_id=%(otelSpanID)s service_name=%(otelServiceName)s] %(message)s
      - PYROSCOPE_ENABLED=true
      - PYROSCOPE_APPLICATION_NAME=taxi-manager-django
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_SAMPLE_RATE=100
      - DEPLOYMENT_ENVIRONMENT=dev
    command: sh -c "make migrate && make collectstatic && make ensure-superuser  && make ensure-demo-data && uv run opentelemetry-instrument make run-uwsgi"
    depends_on:
      db:
        condition: service_healthy 
      memcached:
        condition: service_started
  taxi-manager-asgi:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    labels:
      logging: "alloy"
    volumes:
      - static_volume:/app/staticfiles
      - memcached_socket:/run/memcached
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}  
      - DJANGO_SUPERUSER_NAME=${DJANGO_SUPERUSER_NAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - VK_BOT_TOKEN=${VK_BOT_TOKEN}
      - VK_BOT_GROUP_ID=${VK_BOT_GROUP_ID}
      - DJANGO_MEMCACHED_LOCATION=unix:/run/memcached/memcached.sock
      - PYTHONUNBUFFERED=1
      - OTEL_SERVICE_NAME=taxi-manager-django-asgi
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - DJANGO_SETTINGS_MODULE=taxi_manager.infrastructure.settings
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_PYTHON_LOG_LEVEL=info
      - OTEL_PYTHON_LOG_FORMAT=%(asctime)s %(levelname)s [%(name)s] [trace_id=%(otelTraceID)s span_id=%(otelSpanID)s service_name=%(otelServiceName)s] %(message)s
      - PYROSCOPE_ENABLED=true
      - PYROSCOPE_APPLICATION_NAME=taxi-manager-django
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_SAMPLE_RATE=100
      - DEPLOYMENT_ENVIRONMENT=dev
    command: sh -c "uv run opentelemetry-instrument make run-asgi"
    depends_on:
      db:
        condition: service_healthy 
      memcached:
        condition: service_started

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
      
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
      - tempo  
  task-worker:
    build: .
    image: metacortex687/taxi-manager-dev
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - PYTHONUNBUFFERED=1
    command: sh -c "uv run python manage.py db_worker --queue-name reports,geocoding,default"
    depends_on:
      db:
        condition: service_healthy
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    ports:
      - "127.0.0.1:4040:4040"
    command:
      - "server"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'  # 8+ дней истории
      - '--web.enable-lifecycle'
    ports: 
      - "127.0.0.1:9090:9090"
    volumes: 
      - ./prometheus.yml:/etc/prometheus/prometheus.yml 
      - prometheus_data:/prometheus 

  grafana:
    image: grafana/grafana
    user: root
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    ports:
      - "127.0.0.1:9091:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    environment:
      TZ: "Europe/Moscow"

  memcached:
    image: memcached:1.6
    user: root
    volumes:
      - memcached_socket:/run/memcached
    command:
      - -u
      - root
      - -s
      - /run/memcached/memcached.sock
      - -a
      - "777"
      - --conn-limit=1024
      - --memory-limit=64
      - --threads=4
  goaccess:
    image: allinurl/goaccess
    container_name: goaccess
    ports:
      - 7890:7890
    volumes:
      - ./data/logs/nginx/:/var/log/nginx/
      - ./data/goaccess/:/data/
    command:
      - /var/log/nginx/access.log 
      - --log-format=COMBINED  
      - --datetime-format=%d/%b/%Y:%H:%M:%S %z 
      - -o 
      - /data/report.html
      - --real-time-html

